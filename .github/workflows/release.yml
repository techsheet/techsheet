name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write  # required for cosign keyless signing via GitHub OIDC

jobs:
  build:
    # macOS host can cross-compile all Kotlin/Native targets; Linux hosts skip macosArm64.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
      - name: Assemble all targets
        run: ./gradlew :analyzer:assemble --no-daemon
      - name: Stage release assets
        run: |
          mkdir -p dist
          cp analyzer/build/bin/linuxX64/releaseExecutable/techsheet-analyzer.kexe   dist/techsheet-analyzer_linux-x64
          cp analyzer/build/bin/mingwX64/releaseExecutable/techsheet-analyzer.exe    dist/techsheet-analyzer.exe
          cp analyzer/build/bin/macosArm64/releaseExecutable/techsheet-analyzer.kexe dist/techsheet-analyzer_osx-arm64
          cp analyzer/build/libs/techsheet-analyzer-jvm.jar                          dist/techsheet-analyzer.jar
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist
      - run: chmod +x dist/techsheet-analyzer_linux-x64
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/techsheet/analyzer
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: dist
          file: analyzer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          for f in dist/techsheet-analyzer_linux-x64 dist/techsheet-analyzer.exe dist/techsheet-analyzer_osx-arm64 dist/techsheet-analyzer.jar; do
            cosign sign-blob --yes "$f" --bundle "${f}.sigstore.json"
          done
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/techsheet-analyzer_linux-x64 dist/techsheet-analyzer_linux-x64.sigstore.json \
            dist/techsheet-analyzer.exe dist/techsheet-analyzer.exe.sigstore.json \
            dist/techsheet-analyzer_osx-arm64 dist/techsheet-analyzer_osx-arm64.sigstore.json \
            dist/techsheet-analyzer.jar dist/techsheet-analyzer.jar.sigstore.json
