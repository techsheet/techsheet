name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write  # required for cosign keyless signing via GitHub OIDC

jobs:
  build:
    # macOS host can cross-compile all Kotlin/Native targets; Linux hosts skip macosArm64.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
      - name: Assemble all targets
        run: ./gradlew :cli:assemble --no-daemon
      - name: Stage release assets
        run: |
          mkdir -p dist/cli/linux-x64 dist/cli/windows-x64 dist/cli/macos-arm64 dist/cli/jvm
          cp cli/build/bin/linuxX64/releaseExecutable/techsheet-cli.kexe   dist/cli/linux-x64/techsheet
          cp cli/build/bin/mingwX64/releaseExecutable/techsheet-cli.exe    dist/cli/windows-x64/techsheet.exe
          cp cli/build/bin/macosArm64/releaseExecutable/techsheet-cli.kexe dist/cli/macos-arm64/techsheet
          cp cli/build/libs/techsheet-cli-jvm.jar                          dist/cli/jvm/techsheet.jar
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-assets
          path: dist
      - run: chmod +x dist/cli/linux-x64/techsheet
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/techsheet/analyzer
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: dist/cli/linux-x64
          file: cli/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-assets
          path: dist
      - uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release
          cp dist/cli/linux-x64/techsheet       release/techsheet-linux-x64
          cp dist/cli/windows-x64/techsheet.exe release/techsheet-windows-x64.exe
          cp dist/cli/macos-arm64/techsheet     release/techsheet-macos-arm64
          cp dist/cli/jvm/techsheet.jar         release/techsheet.jar
          for f in release/techsheet-linux-x64 release/techsheet-windows-x64.exe release/techsheet-macos-arm64 release/techsheet.jar; do
            cosign sign-blob --yes "$f" --bundle "${f}.sigstore.json"
          done
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            release/*
