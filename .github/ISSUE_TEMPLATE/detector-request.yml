name: Detector Request
description: Propose a new language, framework, service, or tool for TechSheet to detect.
title: "[detector] "
labels: ["detector-request"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before filing

        Please check the [detectors list](../../blob/master/docs/detectors.md). If a detector exists, but doesn't work
        as expected, please file a **Detector Malfunction** issue instead.

  - type: dropdown
    id: kind
    attributes:
      label: Kind
      description: What category does this fit into?
      options:
        - Language
        - Framework (application, data, security, testing, UI)
        - Service (database, queue, server)
        - Tool (AI, build, CI, container, format, IDE, runtime, security, VCS)
        - Other
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Name
      description: Name of the language, framework, service, or tool.
      placeholder: e.g. Svelte, PostgreSQL, pnpm, Ruby
    validations:
      required: true

  - type: textarea
    id: detection
    attributes:
      label: How should it be detected? (optional)
      description: |
        Anything that helps identify this on disk — config files, manifest entries,
        file extensions, directory layout, dependency names, version sources.
      placeholder: |
        e.g. `svelte.config.js` at project root, or a `"svelte"` entry in package.json.
    validations:
      required: false
